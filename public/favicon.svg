<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d0618"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#eab308" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#eab308" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <!-- Glow -->
  <circle cx="32" cy="32" r="28" fill="url(#glow)"/>
  <!-- Outer ring -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#eab308" stroke-width="1.5" stroke-dasharray="3 2" opacity="0.7"/>
  <!-- Inner ring -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#eab308" stroke-width="0.6" opacity="0.4"/>

  <!-- OM symbol (ॐ) hand-crafted path, golden -->
  <text
    x="32" y="43"
    text-anchor="middle"
    font-family="serif"
    font-size="32"
    font-weight="bold"
    fill="#eab308"
    filter="url(#s)"
  >ॐ</text>

  <defs>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="2" flood-color="#eab308" flood-opacity="0.8"/>
    </filter>
  </defs>

  <!-- Four dots in corners (decorative, Jagannath eyes motif) -->
  <circle cx="14" cy="14" r="1.8" fill="#eab308" opacity="0.5"/>
  <circle cx="50" cy="14" r="1.8" fill="#eab308" opacity="0.5"/>
  <circle cx="14" cy="50" r="1.8" fill="#eab308" opacity="0.5"/>
  <circle cx="50" cy="50" r="1.8" fill="#eab308" opacity="0.5"/>
</svg>